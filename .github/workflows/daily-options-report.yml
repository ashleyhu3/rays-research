name: Generate daily options report

# Runs at 06:00 Asia/Hong_Kong every day. Hong Kong is UTC+8 year-round, so
# 06:00 HKT is 22:00 UTC the previous day — stable without daylight-saving
# adjustments. GitHub Actions cron is always UTC.
#
# 06:00 HKT (was 07:45): the report covers the US session that just closed, and
# that session is already settled well before any HKT-morning run — US close is
# 16:00 ET = 04:00 HKT summer / 05:00 HKT winter — so starting earlier captures
# the same data while leaving ~2h of runway for the now ~80-ticker roster to
# finish, instead of the ~15 minutes the old 07:45 start allowed before 08:00.
#
# Required repository secrets:
#   MASSIVE_API_KEY
#   MONGODB_URI
#   ALPHAVANTAGE_API_KEY  — earnings-call dates. Without it the charts still build,
#     but they fall back to a plain 52-week shift: no last-quarter line, and the
#     year-ago line is no longer aligned to the earnings cycle.
# Optional:
#   MONGODB_DB
#   OPTIONS_REPORT_TICKERS
#   OPTIONS_REPORT_CALENDAR_SYMBOL  — liquid reference symbol for the shared US
#     trading calendar (default SPY); every tracked ticker shares its sessions.

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'YYYY-MM-DD report date; defaults to the current Hong Kong date'
        required: false
      tickers:
        description: 'Comma-separated tickers; defaults to OPTIONS_REPORT_TICKERS or TSM,ASML,INTC,TXN,STM,TEL,GOOG,NOK,SOXX'
        required: false

concurrency:
  group: daily-options-report
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    # A newly introduced expiration needs one full-chain history backfill. Cached
    # daily runs are much faster, but the first run after this migration can cover
    # several thousand option symbols across the ticker roster.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      # Retry a few times: the generate step now exits non-zero on a real failure
      # (a transient Massive/Alpha Vantage hiccup, or an unreachable Mongo — see
      # the storage-mode guard in generateAndStoreDailyOptionsReport.js) instead
      # of silently "succeeding" with nothing persisted. A single bad run (e.g.
      # 2026-07-10) used to leave the report stale for the day; retrying rides out
      # the transient case, and each attempt resumes from the cached chains the
      # previous attempt already backfilled, so it isn't starting over.
      - name: Scrape Massive and store the daily report
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          OPTIONS_REPORT_DATE: ${{ inputs.report_date }}
          OPTIONS_REPORT_TICKERS: ${{ inputs.tickers || secrets.OPTIONS_REPORT_TICKERS }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::options-report:generate attempt $attempt"
            if npm run options-report:generate; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed"
            [ "$attempt" -lt 3 ] && sleep 120
          done
          echo "all attempts failed" >&2
          exit 1

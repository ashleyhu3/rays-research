name: Generate daily options report

# Runs at 07:45 Asia/Hong_Kong every day. Hong Kong is UTC+8 year-round, so
# 07:45 HKT is 23:45 UTC the previous day — stable without daylight-saving
# adjustments. GitHub Actions cron is always UTC.
#
# Required repository secrets:
#   MASSIVE_API_KEY
#   MONGODB_URI
# Optional:
#   MONGODB_DB
#   OPTIONS_REPORT_TICKERS

on:
  schedule:
    - cron: '45 23 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'YYYY-MM-DD report date; defaults to the current Hong Kong date'
        required: false
      tickers:
        description: 'Comma-separated tickers; defaults to OPTIONS_REPORT_TICKERS or TSM,ASML'
        required: false

concurrency:
  group: daily-options-report
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Scrape Massive and store the daily report
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          OPTIONS_REPORT_DATE: ${{ inputs.report_date }}
          OPTIONS_REPORT_TICKERS: ${{ inputs.tickers || secrets.OPTIONS_REPORT_TICKERS }}
        run: npm run options-report:generate

name: Analyze transcript

# Runs the full earnings-transcript pipeline for one ticker/quarter on a GitHub
# runner (which — unlike Vercel — can run the FinBERT Python stack), then
# publishes the enriched result to the same MongoDB the site reads. Triggered
# from the dashboard's "Collect & analyze" button via the GitHub API
# (workflow_dispatch), or manually from the Actions tab.
#
# Required repo secrets:
#   MONGODB_URI, ALPHA_VANTAGE_API_KEY, and GROQ_API_KEY and/or GEMINI_API_KEY
# Optional: MONGODB_DB

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker (e.g. GOOGL)'
        required: true
      quarter:
        description: 'Fiscal quarter (Q1–Q4)'
        required: true
      year:
        description: 'Fiscal year (e.g. 2026)'
        required: true

concurrency:
  group: analyze-transcript-${{ github.event.inputs.ticker }}-${{ github.event.inputs.year }}${{ github.event.inputs.quarter }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci --omit=dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FinBERT deps (CPU torch + transformers)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install transformers

      # Cache the ~800MB FinBERT + emotion model weights across runs.
      - name: Cache transcript models
        uses: actions/cache@v4
        with:
          path: server/data/transcripts/embeddings/models
          key: transcript-models-prosusai-finbert-jhartmann-emotion-v1

      - name: Run pipeline
        env:
          TRANSCRIPT_PYTHON: python
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node server/scripts/analyzeTranscript.js \
            --ticker "${{ github.event.inputs.ticker }}" \
            --quarter "${{ github.event.inputs.quarter }}" \
            --year "${{ github.event.inputs.year }}"

name: Collect dashboard data

# Render's free web service sleeps when idle, so its in-process cron can't be
# relied on to scrape daily. This workflow runs the collector on GitHub's
# always-on scheduler and writes snapshots to the same MongoDB the site reads,
# so history keeps accumulating even while the site is asleep.
#
# Required repo secret: MONGODB_URI
# Optional repo secrets (improve coverage/limits): OPENROUTER_API_KEY,
#   EIA_API_KEY, VAST_API_KEY. GITHUB_TOKEN is provided automatically.
#
# Cloud-GPU price chart: Azure, Oracle and Nebius are pulled live with no key.
# To also pull AWS and GCP live, add these optional secrets (otherwise those two
# use maintained reference rates):
#   AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY  (IAM user with pricing:GetProducts)
#   GCP_BILLING_API_KEY                        (Cloud Billing API key)

on:
  schedule:
    # Every six hours, offset from the top of the hour to reduce congestion.
    # Same-day snapshots overwrite, so duplicate collection is safe.
    - cron: '17 */6 * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: collect-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run collector
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          # Built-in token — authenticates GitHub API calls (MCP search, stars)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          # Daily closes for the StockTwits sentiment snapshot (Yahoo fallback if unset)
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          # Optional — enable live AWS & GCP cloud-GPU prices (else reference rates)
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GCP_BILLING_API_KEY: ${{ secrets.GCP_BILLING_API_KEY }}
        run: node server/scripts/collect.js

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — AI Demand Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d12;--bg-card:#111419;--bg-sidebar:#0d1017;
  --border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#e4e4d8;--sec:#7a7a72;--ter:#454540;
  --accent:#e8c547;--adim:rgba(232,197,71,.12);
  --openai:#10b981;--anthropic:#e8c547;--google:#4285f4;
  --meta:#0866ff;--mistral:#f59e0b;--perplexity:#a78bfa;
  --red:#f87171;--teal:#39d0b4;--orange:#f0883e;
  --minimax:#e879f9;--zhipu:#34d399;--deepseek:#60a5fa;--kimi:#fb923c;
  --sw:230px;
  --font-d:'Bebas Neue',sans-serif;--font-b:'Outfit',sans-serif;--font-m:'Fira Code',monospace;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;}

.sidebar{width:var(--sw);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-word{font-family:var(--font-d);font-size:26px;color:var(--accent);letter-spacing:.05em;}
.logo-sub{font-size:9px;color:var(--ter);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.nav-sec{padding:12px 14px 4px;}
.nav-lbl{font-size:9px;color:var(--ter);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sec);border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px;font-family:var(--font-b);line-height:1.3;}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.nav-item.active{background:var(--adim);color:var(--accent);}
.nav-ico{font-size:11px;flex-shrink:0;opacity:.7;}
.nav-item.active .nav-ico{opacity:1;}
.utag{font-size:9px;margin-left:auto;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--ter);font-family:var(--font-m);white-space:nowrap;}
.nav-item.active .utag{background:var(--adim);color:var(--accent);}
.nav-new{font-size:9px;margin-left:auto;padding:1px 5px;border-radius:3px;background:rgba(232,197,71,.15);color:var(--accent);font-family:var(--font-m);}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.last-upd{font-size:10px;color:var(--ter);margin-bottom:8px;}
.last-upd b{color:var(--sec);}
.leg-block{display:flex;flex-direction:column;gap:5px;}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--sec);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{padding:0 26px;height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,13,18,.96);backdrop-filter:blur(10px);flex-shrink:0;}
.topbar h1{font-family:var(--font-d);font-size:18px;letter-spacing:.05em;color:var(--text);font-weight:400;}
.topbar-r{display:flex;gap:8px;align-items:center;}
.rbtn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--sec);cursor:pointer;font-family:var(--font-b);transition:all .15s;}
.rbtn:hover{border-color:var(--border-hi);color:var(--text);}
.rbtn.active{border-color:var(--accent);background:var(--adim);color:var(--accent);}
.live-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);font-family:var(--font-m);}
.new-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--adim);color:var(--accent);border:1px solid rgba(232,197,71,.2);font-family:var(--font-m);}

.content{flex:1;overflow-y:auto;padding:22px 26px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kc,var(--accent));}
.kpi-val{font-family:var(--font-d);font-size:28px;line-height:1;margin-bottom:2px;}
.kpi-lbl{font-size:10px;color:var(--ter);text-transform:uppercase;letter-spacing:.06em;}
.kpi-delta{font-size:10px;margin-top:4px;font-family:var(--font-m);}
.up{color:#3fb950;}.dn{color:#f87171;}.nt{color:var(--sec);}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.span2{grid-column:1/-1;}
.cbox{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.cbox.new{border-color:rgba(232,197,71,.2);}
.ch-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.ch-title{font-size:12px;font-weight:500;color:var(--text);}
.ch-src{font-size:10px;color:var(--ter);font-family:var(--font-m);}
.ch-sub{font-size:11px;color:var(--sec);margin-bottom:12px;line-height:1.4;}
.cw{position:relative;width:100%;}
.ileg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.il{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sec);}
.il-dot{width:8px;height:8px;border-radius:50%;}
.insight{background:rgba(232,197,71,.06);border:1px solid rgba(232,197,71,.18);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--sec);line-height:1.5;margin-top:10px;}
.insight b{color:var(--accent);}
.src-note{font-size:10px;color:var(--ter);margin-top:8px;font-family:var(--font-m);line-height:1.5;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-word">SIGNAL</div>
    <div class="logo-sub">AI Demand Intelligence · 2026</div>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Overview</div>
    <button class="nav-item active" onclick="V('overview',this)"><span class="nav-ico">◈</span>Overview dashboard<span class="utag">live</span></button>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Developer signals</div>
    <button class="nav-item" onclick="V('pypi',this)"><span class="nav-ico">↓</span>PyPI / npm downloads<span class="utag">weekly</span></button>
    <button class="nav-item" onclick="V('stackoverflow',this)"><span class="nav-ico">?</span>Stack Overflow volume<span class="utag">weekly</span></button>
    <button class="nav-item" onclick="V('github',this)"><span class="nav-ico">⎇</span>GitHub dependents<span class="utag">weekly</span></button>
    <button class="nav-item" onclick="V('trends',this)"><span class="nav-ico">↗</span>Google Trends<span class="utag">daily</span></button>
    <button class="nav-item" onclick="V('jobs',this)"><span class="nav-ico">⚑</span>Job keyword mentions<span class="utag">weekly</span></button>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Consumer signals</div>
    <button class="nav-item" onclick="V('appstore',this)"><span class="nav-ico">★</span>App store rankings<span class="utag">daily</span></button>
    <button class="nav-item" onclick="V('web',this)"><span class="nav-ico">⊙</span>Web traffic & stickiness<span class="utag">monthly</span></button>
    <button class="nav-item" onclick="V('reddit',this)"><span class="nav-ico">↑</span>Reddit / social volume<span class="utag">daily</span></button>
    <button class="nav-item" onclick="V('hf',this)"><span class="nav-ico">⬡</span>HuggingFace downloads<span class="utag">daily</span></button>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Infrastructure</div>
    <button class="nav-item" onclick="V('gpu',this)"><span class="nav-ico">◻</span>GPU spot pricing<span class="utag">hourly</span></button>
    <button class="nav-item" onclick="V('datacenter',this)"><span class="nav-ico">⬛</span>US datacenter build<span class="nav-new">new</span></button>
    <button class="nav-item" onclick="V('electricity',this)"><span class="nav-ico">⚡</span>AI electricity demand<span class="nav-new">new</span></button>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Token consumption</div>
    <button class="nav-item" onclick="V('tokens',this)"><span class="nav-ico">⬭</span>OpenRouter token flow<span class="nav-new">new</span></button>
    <button class="nav-item" onclick="V('chinese',this)"><span class="nav-ico">龙</span>Chinese LLM usage<span class="nav-new">new</span></button>
  </div>

  <div class="sidebar-footer">
    <div class="last-upd">Refreshed: <b>May 11, 2026 · 09:14 ET</b></div>
    <div class="leg-block">
      <div class="leg"><div class="leg-dot" style="background:var(--openai)"></div>OpenAI / ChatGPT</div>
      <div class="leg"><div class="leg-dot" style="background:var(--anthropic)"></div>Anthropic / Claude</div>
      <div class="leg"><div class="leg-dot" style="background:var(--google)"></div>Google / Gemini</div>
      <div class="leg"><div class="leg-dot" style="background:var(--minimax)"></div>MiniMax</div>
      <div class="leg"><div class="leg-dot" style="background:var(--zhipu)"></div>Zhipu / GLM</div>
      <div class="leg"><div class="leg-dot" style="background:var(--deepseek)"></div>DeepSeek</div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <h1 id="page-title">OVERVIEW DASHBOARD</h1>
    <div class="topbar-r">
      <button class="rbtn active" onclick="setR(12,this)">12 wk</button>
      <button class="rbtn" onclick="setR(24,this)">24 wk</button>
      <button class="rbtn" onclick="setR(52,this)">1 yr</button>
      <span id="new-tag" class="new-badge" style="display:none">● new source</span>
      <span class="live-badge">● simulated</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>

<script>
/* ── PALETTE ── */
const C={
  openai:'#10b981',anthropic:'#e8c547',google:'#4285f4',
  mistral:'#f59e0b',meta:'#0866ff',perplexity:'#a78bfa',
  minimax:'#e879f9',zhipu:'#34d399',deepseek:'#60a5fa',
  kimi:'#fb923c',xiaomi:'#f43f5e',baidu:'#3b82f6',
  red:'#f87171',teal:'#39d0b4',orange:'#f0883e',slate:'#94a3b8',
};
const fa=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;};

/* ── TIME ── */
let WEEKS=12;
function wkLabels(n){const a=[],b=new Date('2026-05-05');for(let i=n-1;i>=0;i--){const d=new Date(b);d.setDate(d.getDate()-i*7);a.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));}return a;}
function dayLabels(n){const a=[],b=new Date('2026-05-05');for(let i=n-1;i>=0;i--){const d=new Date(b);d.setDate(d.getDate()-i);a.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));}return a;}

/* ── DATA ── */
function trend(s,e,n,ns=.06){const o=[];for(let i=0;i<n;i++){const t=i/(n-1);o.push(Math.round((s+(e-s)*t)*(1+(Math.random()-.5)*ns)));}return o;}
function series(b,v=.04,n=12){const o=[b];for(let i=1;i<n;i++)o.push(Math.round(o[i-1]*(1+(Math.random()-.5)*v*2)));return o;}

/* ── CHART HELPERS ── */
function mkDs(label,color,data,fill=false){return{label,data,borderColor:color,backgroundColor:fill?fa(color,.12):fa(color,0),pointBackgroundColor:color,pointRadius:3,pointHoverRadius:5,borderWidth:2,tension:.4,fill};}
const GRID={color:'rgba(255,255,255,.04)'};
const TICK={color:'#454540',font:{size:10,family:"'Outfit',sans-serif"}};
const BORD={color:'rgba(255,255,255,.06)'};
const baseOpts=yFmt=>({
  responsive:true,maintainAspectRatio:false,animation:{duration:300},
  interaction:{mode:'index',intersect:false},
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1f2a',borderColor:'rgba(255,255,255,.12)',borderWidth:1,titleFont:{family:"'Outfit',sans-serif",size:11},bodyFont:{family:"'Outfit',sans-serif",size:11},padding:10,callbacks:{label:c=>` ${c.dataset.label}: ${yFmt(c.parsed.y)}`}}},
  scales:{x:{grid:GRID,ticks:{...TICK,maxTicksLimit:8,autoSkip:true},border:BORD},y:{grid:GRID,ticks:{...TICK,callback:v=>yFmt(v)},border:BORD,beginAtZero:false}},
});
const fmtM=v=>v>=1e12?`${(v/1e12).toFixed(1)}T`:v>=1e9?`${(v/1e9).toFixed(1)}B`:v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}k`:v;
const fmtK=v=>v>=1e3?`${(v/1e3).toFixed(1)}k`:v;
const fmtN=v=>v.toLocaleString();
const fmtP=v=>`${v.toFixed(1)}`;

let CH={};
function destroyAll(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};}
function makeChart(id,type,labels,datasets,opts,height=200){
  const w=document.getElementById(id);if(!w)return;
  w.style.height=height+'px';
  const cv=document.createElement('canvas');w.appendChild(cv);
  CH[id]=new Chart(cv,{type,data:{labels,datasets},options:opts});
}
function ileg(items){return `<div class="ileg">${items.map(([l,c])=>`<div class="il"><div class="il-dot" style="background:${c}"></div>${l}</div>`).join('')}</div>`;}

/* ══════════════════════════════════════════
   ORIGINAL VIEWS
══════════════════════════════════════════ */

function renderOverview(){
  const W=WEEKS,wk=wkLabels(W);
  const kpis=[
    {val:'16.2M',lbl:'PyPI anthropic downloads / wk',delta:'+18% MoM',cls:'up',kc:'var(--anthropic)'},
    {val:'412',lbl:'SO questions (anthropic-claude) / wk',delta:'+24% MoM',cls:'up',kc:'var(--anthropic)'},
    {val:'18.4k',lbl:'GitHub repos depend on anthropic SDK',delta:'+31% MoM',cls:'up',kc:'var(--anthropic)'},
    {val:'45%',lbl:'Chinese model share of OpenRouter tokens',delta:'↑ from <2% (Apr 2025)',cls:'up',kc:'var(--minimax)'},
    {val:'325',lbl:'US datacenter TWh demand projected 2028',delta:'↑ from 183 TWh in 2024',cls:'up',kc:'var(--teal)'},
  ];
  document.getElementById('content').innerHTML=`
    <div class="kpi-row">${kpis.map(k=>`<div class="kpi" style="--kc:${k.kc}"><div class="kpi-val" style="color:${k.kc}">${k.val}</div><div class="kpi-lbl">${k.lbl}</div><div class="kpi-delta ${k.cls}">${k.delta}</div></div>`).join('')}</div>
    <div class="cgrid">
      <div class="cbox span2">
        <div class="ch-head"><div class="ch-title">PyPI weekly downloads — Python SDK installs</div><div class="ch-src">pypistats.org · free · no auth</div></div>
        <div class="ch-sub">Weekly installs for each AI provider SDK. The most direct, automatable developer-adoption signal at zero cost.</div>
        ${ileg([['openai',C.openai],['anthropic',C.anthropic],['google-generativeai',C.google],['mistralai',C.mistral]])}
        <div class="cw" id="ov-pypi"></div>
      </div>
      <div class="cbox">
        <div class="ch-head"><div class="ch-title">OpenRouter weekly tokens — by provider origin</div><div class="ch-src">openrouter.ai/rankings (public)</div></div>
        <div class="ch-sub">Real token throughput on OpenRouter. Chinese models now rival US incumbents by volume.</div>
        ${ileg([['US models',C.openai],['Chinese models',C.minimax],['EU / other',C.slate]])}
        <div class="cw" id="ov-tokens"></div>
      </div>
      <div class="cbox">
        <div class="ch-head"><div class="ch-title">US datacenter electricity demand (TWh / yr)</div><div class="ch-src">IEA · EIA · Lawrence Berkeley Lab</div></div>
        <div class="ch-sub">AI-driven power demand is now 50% of all new US electricity growth. Heading to 325–580 TWh by 2028.</div>
        <div class="cw" id="ov-elec"></div>
      </div>
    </div>`;
  makeChart('ov-pypi','line',wk,[
    mkDs('openai',C.openai,trend(38e6,42e6,W,.05)),
    mkDs('anthropic',C.anthropic,trend(9e6,16.2e6,W,.06)),
    mkDs('google-generativeai',C.google,trend(14e6,18e6,W,.05)),
    mkDs('mistralai',C.mistral,trend(3.2e6,5.1e6,W,.07)),
  ],baseOpts(fmtM),230);
  makeChart('ov-tokens','bar',wk,[
    {label:'US models',data:trend(11e12,11e12,W,.05),backgroundColor:fa(C.openai,.6),borderRadius:3},
    {label:'Chinese models',data:trend(1e12,10e12,W,.08),backgroundColor:fa(C.minimax,.7),borderRadius:3},
    {label:'EU/other',data:trend(500e9,900e9,W,.06),backgroundColor:fa(C.slate,.5),borderRadius:3},
  ],{...baseOpts(fmtM),scales:{...baseOpts(fmtM).scales,x:{...baseOpts(fmtM).scales.x,stacked:true},y:{...baseOpts(fmtM).scales.y,stacked:true}}},200);
  const elecYears=['2017','2018','2019','2020','2021','2022','2023','2024','2025e','2026e','2027e','2028e'];
  const elecVals=[90,100,112,120,130,148,162,183,220,268,295,340];
  makeChart('ov-elec','line',elecYears.slice(0,Math.min(WEEKS,12)),[
    mkDs('US DC electricity (TWh)',C.teal,elecVals.slice(0,Math.min(WEEKS,12)),true),
  ],baseOpts(v=>`${v} TWh`),200);
}

function renderPypi(){
  const W=WEEKS,wk=wkLabels(W);
  document.getElementById('content').innerHTML=`
    <div class="cgrid">
      <div class="cbox span2">
        <div class="ch-head"><div class="ch-title">PyPI weekly downloads — Python SDK installs</div><div class="ch-src">pypistats.org · free · no auth</div></div>
        <div class="ch-sub">Weekly downloads for each AI provider's Python SDK. Zero cost, fully automatable.</div>
        ${ileg([['openai',C.openai],['anthropic',C.anthropic],['google-generativeai',C.google],['mistralai',C.mistral]])}
        <div class="cw" id="pypi-main"></div>
        <div class="insight">The <b>anthropic</b> package grew <b>+80% in 12 weeks</b>, the fastest of any major provider SDK. OpenAI leads in volume but growth is flat at ~+5% QoQ.</div>
      </div>
      <div class="cbox">
        <div class="ch-head"><div class="ch-title">Anthropic vs OpenAI — share of combined installs</div><div class="ch-src">pypistats.org</div></div>
        <div class="ch-sub">Anthropic's share of the combined install base has nearly doubled in 6 months.</div>
        ${ileg([['Anthropic %',C.anthropic],['OpenAI %',C.openai]])}
        <div class="cw" id="pypi-share"></div>
      </div>
      <div class="cbox">
        <div class="ch-head"><div class="ch-title">npm weekly downloads — JS/TS SDKs</div><div class="ch-src">npmjs.com registry API</div></div>
        <div class="ch-sub">Node.js ecosystem. OpenAI's npm package still leads but Anthropic is closing.</div>
        ${ileg([['openai (npm)',C.openai],['@anthropic-ai/sdk',C.anthropic],['@google/generative-ai',C.google]])}
        <div class="cw" id="pypi-npm"></div>
      </div>
    </div>`;
  const oa=trend(38e6,42e6,W,.05),an=trend(9e6,16.2e6,W,.06);
  makeChart('pypi-main','line',wk,[mkDs('openai',C.openai,oa),mkDs('anthropic',C.anthropic,an,true),mkDs('google-gen-ai',C.google,trend(14e6,18e6,W,.05)),mkDs('mistralai',C.mistral,trend(3.2e6,5.1e6,W,.07))],baseOpts(fmtM),250);
  const sAn=an.map((a,i)=>parseFloat((a/(a+oa[i])*100).toFixed(1)));
  makeChart('pypi-share','line',wk,[mkDs('Anthropic %',C.anthropic,sAn,true),mkDs('OpenAI %',C.openai,sAn.map(s=>parseFloat((100-s).toFixed(1))))],baseOpts(v=>`${v.toFixed(1)}%`),200);
  makeChart('pypi-npm','line',wk,[mkDs('openai',C.openai,trend(9.2e6,9.8e6,W,.05)),mkDs('@anthropic-ai/sdk',C.anthropic,trend(1.8e6,3.4e6,W,.07)),mkDs('@google/gen-ai',C.google,trend(3.1e6,4.2e6,W,.06))],baseOpts(fmtM),200);
}

function renderSO(){
  const W=WEEKS,wk=wkLabels(W);
  document.getElementById('content').innerHTML=`
    <div class="cgrid">
      <div class="cbox span2">
        <div class="ch-head"><div class="ch-title">Stack Overflow — new questions per week by tag</div><div class="ch-src">stackexchange API · free · 10k req/day</div></div>
        <div class="ch-sub">New question volume per tagged framework. Adoption friction proxy.</div>

let currentView='overview';

function V(view,el){
  destroyAll();
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  currentView=view;
  const vd=VIEWS[view];
  document.getElementById('page-title').textContent=vd?.title||view.toUpperCase();
  const nt=document.getElementById('new-tag');
  nt.style.display=vd?.isNew?'inline-flex':'none';
  document.getElementById('content').innerHTML='';
  vd?.fn();
}

function setR(w,el){
  WEEKS=w;
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  V(currentView,null);
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — AI Demand Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d12; --bg-card:#111419; --bg-sidebar:#0d1017;
  --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.14);
  --text:#e4e4d8; --sec:#7a7a72; --ter:#454540;
  --accent:#e8c547; --adim:rgba(232,197,71,0.12);
  --openai:#10b981; --anthropic:#e8c547; --google:#4285f4; --meta:#0866ff; --mistral:#f59e0b; --perplexity:#a78bfa;
  --sw:230px; --font-d:'Bebas Neue',sans-serif; --font-b:'Outfit',sans-serif; --font-m:'Fira Code',monospace;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-word{font-family:var(--font-d);font-size:26px;color:var(--accent);letter-spacing:.05em;}
.logo-sub{font-size:9px;color:var(--ter);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.nav-sec{padding:14px 14px 6px;}
.nav-lbl{font-size:9px;color:var(--ter);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--sec);border:none;background:none;width:100%;text-align:left;transition:all .15s;margin-bottom:1px;font-family:var(--font-b);line-height:1.3;}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.nav-item.active{background:var(--adim);color:var(--accent);}
.nav-ico{font-size:12px;flex-shrink:0;opacity:.7;}
.nav-item.active .nav-ico{opacity:1;}
.update-tag{font-size:9px;margin-left:auto;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--ter);font-family:var(--font-m);white-space:nowrap;}
.nav-item.active .update-tag{background:var(--adim);color:var(--accent);}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.last-update{font-size:10px;color:var(--ter);margin-bottom:8px;}
.last-update b{color:var(--sec);}
.legend-block{display:flex;flex-direction:column;gap:6px;}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--sec);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{padding:0 26px;height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,13,18,.96);backdrop-filter:blur(10px);flex-shrink:0;}
.topbar h1{font-family:var(--font-d);font-size:18px;letter-spacing:.05em;color:var(--text);font-weight:400;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.range-btn{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--sec);cursor:pointer;font-family:var(--font-b);transition:all .15s;}
.range-btn:hover{border-color:var(--border-hi);color:var(--text);}
.range-btn.active{border-color:var(--accent);background:var(--adim);color:var(--accent);}
.live-badge{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);font-family:var(--font-m);}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 26px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}

/* METRICS STRIP */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi-val{font-family:var(--font-d);font-size:28px;line-height:1;margin-bottom:2px;}
.kpi-lbl{font-size:10px;color:var(--ter);text-transform:uppercase;letter-spacing:.06em;}
.kpi-delta{font-size:10px;margin-top:4px;font-family:var(--font-m);}
.up{color:#3fb950;} .dn{color:#f87171;} .nt{color:var(--sec);}

/* CHART GRID */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.span2{grid-column:1/-1;}
.chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.chart-box.active-source{border-color:rgba(232,197,71,.35);box-shadow:0 0 0 1px rgba(232,197,71,.1);}
.ch-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.ch-title{font-size:12px;font-weight:500;color:var(--text);}
.ch-src{font-size:10px;color:var(--ter);font-family:var(--font-m);}
.ch-sub{font-size:11px;color:var(--sec);margin-bottom:12px;line-height:1.4;}
.chart-wrap{position:relative;width:100%;}

/* INLINE LEGEND */
.inline-leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
.il{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sec);}
.il-dot{width:8px;height:8px;border-radius:50%;}

/* INSIGHT CALLOUT */
.insight{background:rgba(232,197,71,.06);border:1px solid rgba(232,197,71,.18);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--sec);line-height:1.5;margin-top:10px;}
.insight b{color:var(--accent);}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-word">SIGNAL</div>
    <div class="logo-sub">AI Demand Intelligence · 2026</div>
  </div>

  <div class="nav-sec">
    <div class="nav-lbl">Data sources</div>
    <button class="nav-item active" onclick="showView('overview',this)"><span class="nav-ico">◈</span>Overview<span class="update-tag">live</span></button>
    <button class="nav-item" onclick="showView('pypi',this)"><span class="nav-ico">↓</span>PyPI / npm downloads<span class="update-tag">weekly</span></button>
    <button class="nav-item" onclick="showView('stackoverflow',this)"><span class="nav-ico">?</span>Stack Overflow volume<span class="update-tag">weekly</span></button>
    <button class="nav-item" onclick="showView('github',this)"><span class="nav-ico">⎇</span>GitHub dependents<span class="update-tag">weekly</span></button>
    <button class="nav-item" onclick="showView('trends',this)"><span class="nav-ico">↗</span>Google Trends<span class="update-tag">daily</span></button>
    <button class="nav-item" onclick="showView('jobs',this)"><span class="nav-ico">⚑</span>Job keyword mentions<span class="update-tag">weekly</span></button>
    <button class="nav-item" onclick="showView('appstore',this)"><span class="nav-ico">★</span>App store rankings<span class="update-tag">daily</span></button>
    <button class="nav-item" onclick="showView('web',this)"><span class="nav-ico">⊙</span>Web traffic & stickiness<span class="update-tag">monthly</span></button>
    <button class="nav-item" onclick="showView('gpu',this)"><span class="nav-ico">◻</span>GPU spot pricing<span class="update-tag">hourly</span></button>
    <button class="nav-item" onclick="showView('reddit',this)"><span class="nav-ico">↑</span>Reddit / social volume<span class="update-tag">daily</span></button>
    <button class="nav-item" onclick="showView('hf',this)"><span class="nav-ico">⬡</span>HuggingFace downloads<span class="update-tag">daily</span></button>
  </div>

  <div class="sidebar-footer">
    <div class="last-update">Last refreshed: <b>Apr 9, 2026 · 09:14 ET</b></div>
    <div class="legend-block">
      <div class="leg"><div class="leg-dot" style="background:var(--openai)"></div>OpenAI / ChatGPT</div>
      <div class="leg"><div class="leg-dot" style="background:var(--anthropic)"></div>Anthropic / Claude</div>
      <div class="leg"><div class="leg-dot" style="background:var(--google)"></div>Google / Gemini</div>
      <div class="leg"><div class="leg-dot" style="background:var(--mistral)"></div>Mistral</div>
      <div class="leg"><div class="leg-dot" style="background:var(--perplexity)"></div>Perplexity</div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <h1 id="page-title">OVERVIEW DASHBOARD</h1>
    <div class="topbar-right">
      <button class="range-btn active" onclick="setRange(12,this)">12 wk</button>
      <button class="range-btn" onclick="setRange(24,this)">24 wk</button>
      <button class="range-btn" onclick="setRange(52,this)">1 yr</button>
      <span class="live-badge">● simulated</span>
    </div>
  </div>

  <div class="content" id="content"></div>
</main>

<script>
/* ─── PALETTE ─── */
const C = {
  openai:     '#10b981',
  anthropic:  '#e8c547',
  google:     '#4285f4',
  mistral:    '#f59e0b',
  meta:       '#0866ff',
  perplexity: '#a78bfa',
};
const fa = (hex,a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };

/* ─── TIME AXIS ─── */
let WEEKS = 12;
function makeWeeks(n) {
  const labels=[], base=new Date('2026-04-07');
  for(let i=n-1;i>=0;i--){
    const d=new Date(base); d.setDate(d.getDate()-i*7);
    labels.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  }
  return labels;
}
function makeDays(n) {
  const labels=[], base=new Date('2026-04-07');
  for(let i=n-1;i>=0;i--){
    const d=new Date(base); d.setDate(d.getDate()-i);
    labels.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  }
  return labels;
}

/* ─── DATA GENERATORS ─── */
function trend(start, end, n, noise=0.06) {
  const out=[];
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const base=start+(end-start)*t;
    out.push(Math.round(base*(1+(Math.random()-.5)*noise)));
  }
  return out;
}
function series(base, volatility=0.04, n=12) {
  const out=[base];
  for(let i=1;i<n;i++) out.push(Math.round(out[i-1]*(1+(Math.random()-.5)*volatility*2)));
  return out;
}

/* ─── DATASET GENERATOR ─── */
function mkDs(label,color,data,fill=false){
  return {
    label, data,
    borderColor: color,
    backgroundColor: fill ? fa(color,.12) : fa(color,.0),
    pointBackgroundColor: color,
    pointRadius: 3, pointHoverRadius: 5,
    borderWidth: 2,
    tension: 0.4,
    fill,
  };
}

/* ─── CHART DEFAULTS ─── */
const GRID = { color:'rgba(255,255,255,.04)' };
const TICK = { color:'#454540', font:{ size:10, family:"'Outfit',sans-serif" } };
const BORDER = { color:'rgba(255,255,255,.06)' };
const baseOpts = (yFmt) => ({
  responsive:true, maintainAspectRatio:false, animation:{ duration:300 },
  interaction:{ mode:'index', intersect:false },
  plugins:{
    legend:{ display:false },
    tooltip:{
      backgroundColor:'#1a1f2a', borderColor:'rgba(255,255,255,.12)', borderWidth:1,
      titleFont:{ family:"'Outfit',sans-serif", size:11 },
      bodyFont:{ family:"'Outfit',sans-serif", size:11 },
      padding:10,
      callbacks:{ label: c => ` ${c.dataset.label}: ${yFmt(c.parsed.y)}` },
    },
  },
  scales:{
    x:{ grid:GRID, ticks:{...TICK, maxTicksLimit:8, autoSkip:true}, border:BORDER },
    y:{ grid:GRID, ticks:{...TICK, callback: v=>yFmt(v)}, border:BORDER, beginAtZero:false },
  },
});

const fmtM = v => v>=1e6?`${(v/1e6).toFixed(1)}M`:v>=1e3?`${(v/1e3).toFixed(0)}k`:v;
const fmtK = v => v>=1e3?`${(v/1e3).toFixed(1)}k`:v;
const fmtN = v => v.toLocaleString();
const fmtD = v => `$${v.toFixed(2)}`;
const fmtP = v => `${v.toFixed(1)}`;

let charts = {};
function destroyAll(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }

function makeChart(id, type, labels, datasets, opts, height=200){
  const wrap = document.getElementById(id);
  if(!wrap) return;
  wrap.style.height = height+'px';
  const canvas = document.createElement('canvas');
  wrap.appendChild(canvas);
  charts[id] = new Chart(canvas, { type, data:{ labels, datasets }, options:opts });
}

function inlineLeg(items){
  return `<div class="inline-leg">${items.map(([lbl,clr])=>`<div class="il"><div class="il-dot" style="background:${clr}"></div>${lbl}</div>`).join('')}</div>`;
}

/* ═══════════════════════════════════════
   VIEWS
═══════════════════════════════════════ */

function renderOverview(){
  const W=WEEKS, wk=makeWeeks(W);

  /* KPI snapshot */
  const kpis = [
    { val:'16.2M', lbl:'PyPI anthropic downloads / wk', delta:'+18% MoM', cls:'up', color:'var(--anthropic)' },
    { val:'412',   lbl:'SO questions (anthropic-claude) / wk', delta:'+24% MoM', cls:'up', color:'var(--anthropic)' },
    { val:'18.4k', lbl:'GitHub repos depend on anthropic SDK', delta:'+31% MoM', cls:'up', color:'var(--anthropic)' },
    { val:'#4',    lbl:'Claude iOS Productivity rank (US)', delta:'▲2 positions', cls:'up', color:'var(--anthropic)' },
    { val:'874',   lbl:'"Claude API" job mentions / wk', delta:'+44% QoQ', cls:'up', color:'var(--anthropic)' },
  ];
  const kpiHtml = kpis.map(k=>`
    <div class="kpi" style="--kc:${k.color}">
      <style>.kpi::after{background:var(--kc,var(--accent))!important}</style>
      <div class="kpi-val" style="color:${k.color}">${k.val}</div>
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-delta ${k.cls}">${k.delta}</div>
    </div>`).join('');

  /* Overview charts */
  document.getElementById('content').innerHTML = `
    <div class="kpi-row">${kpiHtml}</div>

    <div class="chart-grid">
      <div class="chart-box span2">
        <div class="ch-head"><div class="ch-title">Package downloads — PyPI weekly installs</div><div class="ch-src">source: pypistats.org</div></div>
        <div class="ch-sub">Weekly Python package downloads. Most direct developer-adoption signal available at zero cost.</div>
        ${inlineLeg([['openai',C.openai],['anthropic',C.anthropic],['google-generativeai',C.google],['mistralai',C.mistral]])}
        <div class="chart-wrap" id="ov-pypi"></div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Stack Overflow — new questions / week</div><div class="ch-src">source: stackexchange API</div></div>
        <div class="ch-sub">Developer mindshare and adoption friction proxy.</div>
        ${inlineLeg([['openai-api',C.openai],['anthropic-claude',C.anthropic],['google-gemini-api',C.google]])}
        <div class="chart-wrap" id="ov-so"></div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Job postings — AI model API keywords / week</div><div class="ch-src">source: theirstack API</div></div>
        <div class="ch-sub">F500 job descriptions mentioning each model API. Market-pull signal.</div>
        ${inlineLeg([['OpenAI / GPT',C.openai],['Claude / Anthropic',C.anthropic],['Gemini',C.google]])}
        <div class="chart-wrap" id="ov-jobs"></div>
      </div>
    </div>`;

  makeChart('ov-pypi','line',wk,[
    mkDs('openai',        C.openai,     trend(38e6,42e6,W,.05)),
    mkDs('anthropic',     C.anthropic,  trend(9e6,16.2e6,W,.06)),
    mkDs('google-gen-ai', C.google,     trend(14e6,18e6,W,.05)),
    mkDs('mistralai',     C.mistral,    trend(3.2e6,5.1e6,W,.07)),
  ], baseOpts(fmtM), 230);

  makeChart('ov-so','bar',wk,[
    { label:'openai-api',        data:trend(1100,980,W,.08), backgroundColor:fa(C.openai,.7), borderRadius:3 },
    { label:'anthropic-claude',  data:trend(180,412,W,.1),  backgroundColor:fa(C.anthropic,.7), borderRadius:3 },
    { label:'google-gemini-api', data:trend(210,340,W,.09), backgroundColor:fa(C.google,.7), borderRadius:3 },
  ], {...baseOpts(fmtN), plugins:{...baseOpts(fmtN).plugins}, scales:{...baseOpts(fmtN).scales, x:{...baseOpts(fmtN).scales.x, stacked:false}}}, 200);

  makeChart('ov-jobs','line',wk,[
    mkDs('OpenAI/GPT',   C.openai,    trend(2800,2650,W,.06)),
    mkDs('Claude/Anthropic', C.anthropic, trend(420,874,W,.07)),
    mkDs('Gemini',       C.google,    trend(380,610,W,.07)),
  ], baseOpts(fmtN), 200);
}

/* ─── PyPI / npm ─── */
function renderPypi(){
  const W=WEEKS, wk=makeWeeks(W);
  document.getElementById('content').innerHTML = `
    <div class="chart-grid">
      <div class="chart-box span2">
        <div class="ch-head"><div class="ch-title">PyPI weekly downloads — Python SDK installs</div><div class="ch-src">source: pypistats.org (free, no auth)</div></div>
        <div class="ch-sub">Weekly download counts for each AI provider's Python package. The cleanest, most automatable developer-adoption signal. Zero cost.</div>
        ${inlineLeg([['openai',C.openai],['anthropic',C.anthropic],['google-generativeai',C.google],['mistralai',C.mistral]])}
        <div class="chart-wrap" id="pypi-main"></div>
        <div class="insight">Anthropic's <b>anthropic</b> package has grown <b>+80% in 12 weeks</b>, the fastest of any major provider SDK. OpenAI still leads in absolute volume but its growth rate has flattened to ~+5% QoQ.</div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Anthropic vs OpenAI — share of combined installs</div><div class="ch-src">pypistats.org</div></div>
        <div class="ch-sub">Anthropic's share of the OpenAI + Anthropic combined install base has nearly doubled in 6 months.</div>
        ${inlineLeg([['Anthropic %',C.anthropic],['OpenAI %',C.openai]])}
        <div class="chart-wrap" id="pypi-share"></div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">npm weekly downloads — JS/TS SDKs</div><div class="ch-src">source: npmjs.com registry API</div></div>
        <div class="ch-sub">Frontend and Node.js ecosystem. OpenAI's npm package still leads but Anthropic's is closing.</div>
        ${inlineLeg([['openai (npm)',C.openai],['@anthropic-ai/sdk',C.anthropic],['@google/generative-ai',C.google]])}
        <div class="chart-wrap" id="pypi-npm"></div>
      </div>
    </div>`;

  const oa = trend(38e6,42e6,W,.05);
  const an = trend(9e6,16.2e6,W,.06);
  makeChart('pypi-main','line',wk,[
    mkDs('openai',C.openai,oa,false),
    mkDs('anthropic',C.anthropic,an,true),
    mkDs('google-generativeai',C.google,trend(14e6,18e6,W,.05),false),
    mkDs('mistralai',C.mistral,trend(3.2e6,5.1e6,W,.07),false),
  ], baseOpts(fmtM), 250);

  const shareAn = an.map((a,i)=>parseFloat((a/(a+oa[i])*100).toFixed(1)));
  const shareOa = shareAn.map(s=>parseFloat((100-s).toFixed(1)));
  makeChart('pypi-share','line',wk,[
    mkDs('Anthropic %',C.anthropic, shareAn, true),
    mkDs('OpenAI %',   C.openai,    shareOa, false),
  ], baseOpts(v=>`${v.toFixed(1)}%`), 200);

  makeChart('pypi-npm','line',wk,[
    mkDs('openai (npm)', C.openai,   trend(9.2e6,9.8e6,W,.05)),
    mkDs('@anthropic-ai/sdk', C.anthropic, trend(1.8e6,3.4e6,W,.07)),
    mkDs('@google/generative-ai', C.google, trend(3.1e6,4.2e6,W,.06)),
  ], baseOpts(fmtM), 200);
}

/* ─── Stack Overflow ─── */
function renderSO(){
  const W=WEEKS, wk=makeWeeks(W);
  document.getElementById('content').innerHTML = `
    <div class="chart-grid">
      <div class="chart-box span2">
        <div class="ch-head"><div class="ch-title">Stack Overflow — new questions per week by tag</div><div class="ch-src">source: stackexchange API (free, no auth, 10k req/day)</div></div>
        <div class="ch-sub">New question volume per tagged framework. Higher volume = more developer friction AND more developer adoption. Anthropic is accelerating.</div>
        ${inlineLeg([['[openai-api]',C.openai],['[anthropic-claude]',C.anthropic],['[google-gemini-api]',C.google],['[langchain]','#f87171']])}
        <div class="chart-wrap" id="so-main"></div>
        <div class="insight"><b>[anthropic-claude]</b> questions grew from <b>~180/wk to 412/wk</b> over 12 weeks — a +129% surge that mirrors the PyPI download curve. Friction is rising fast because adoption is rising fast.</div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Total cumulative questions (all time)</div><div class="ch-src">stackexchange API</div></div>
        <div class="ch-sub">Stack Overflow question depth shows maturity and ecosystem size.</div>
        <div class="chart-wrap" id="so-total"></div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Answer rate — % of questions with accepted answer</div><div class="ch-src">stackexchange API</div></div>
        <div class="ch-sub">Higher answer rate = healthier, more mature developer community around each tool.</div>
        ${inlineLeg([['openai-api',C.openai],['anthropic-claude',C.anthropic],['gemini',C.google]])}
        <div class="chart-wrap" id="so-ans"></div>

        <div class="chart-wrap" id="hf-main"></div>
        <div class="insight"><b>DeepSeek-V3</b> and <b>Qwen-2.5</b> are the fastest-growing open-weight downloads in 2026 Q1. Llama 3.1 remains the anchor with <b>~24M downloads/week</b>. Open-source is consolidating around a smaller set of highly-downloaded flagship models.</div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">Model category breakdown — top 50 models by type</div><div class="ch-src">huggingface API</div></div>
        <div class="ch-sub">What types of models dominate the top 50 by download count.</div>
        <div class="chart-wrap" id="hf-cat"></div>
      </div>

      <div class="chart-box">
        <div class="ch-head"><div class="ch-title">New model uploads per week — ecosystem activity</div><div class="ch-src">huggingface models API</div></div>
        <div class="ch-sub">New model submissions to HuggingFace. A proxy for open-source ecosystem vitality and research pace.</div>
        <div class="chart-wrap" id="hf-new"></div>
      </div>
    </div>`;

  makeChart('hf-main','line',wk,[
    mkDs('Llama-3.1-70B (Meta)', C.meta, trend(21e6,24.2e6,W,.05)),
    mkDs('Qwen-2.5-72B', C.openai, trend(8e6,14.8e6,W,.08)),
    mkDs('Mistral-7B-v0.3', C.mistral, trend(11e6,9.4e6,W,.06)),
    mkDs('DeepSeek-V3', C.anthropic, trend(2.4e6,12.1e6,W,.1)),
    mkDs('Gemma-3-27B (Google)', C.google, trend(4.2e6,7.6e6,W,.07)),
  ], baseOpts(fmtM), 250);

  const catLabels=['Text Generation','Embeddings','Image Generation','Speech','Code Gen','Multimodal'];
  const catData=[38,22,14,9,10,7];
  makeChart('hf-cat','doughnut',catLabels,[{
    data:catData,
    backgroundColor:[C.openai,C.anthropic,C.google,C.mistral,C.meta,C.perplexity].map(c=>fa(c,.75)),
    borderColor:'#111419', borderWidth:3,
  }],{
    responsive:true,maintainAspectRatio:false,animation:{duration:300},
    cutout:'55%',
    plugins:{
      legend:{display:true,position:'right',labels:{color:'#7a7a72',font:{size:10,family:"'Outfit',sans-serif"},padding:10,boxWidth:10}},
      tooltip:{backgroundColor:'#1a1f2a',borderColor:'rgba(255,255,255,.12)',borderWidth:1,bodyFont:{family:"'Outfit',sans-serif",size:11},callbacks:{label:c=>` ${c.label}: ${c.parsed}%`}},
    },
  }, 200);

  makeChart('hf-new','bar',wk,[{
    data:trend(4200,5800,W,.08),
    backgroundColor:wk.map((_,i)=>fa(C.anthropic, 0.3+i/wk.length*0.5)),
    borderColor: C.anthropic, borderWidth:1, borderRadius:3,
  }], baseOpts(fmtK), 200);
}

const VIEWS = {
  overview: { title:'OVERVIEW DASHBOARD', fn: renderOverview },
  pypi:     { title:'PYPI / NPM DOWNLOADS', fn: renderPypi },
  stackoverflow: { title:'STACK OVERFLOW VOLUME', fn: renderSO },
  github:   { title:'GITHUB DEPENDENTS', fn: renderGitHub },
  trends:   { title:'GOOGLE TRENDS', fn: renderTrends },
  jobs:     { title:'JOB KEYWORD MENTIONS', fn: renderJobs },
  appstore: { title:'APP STORE RANKINGS', fn: renderAppStore },
  web:      { title:'WEB TRAFFIC & STICKINESS', fn: renderWeb },
  gpu:      { title:'GPU SPOT PRICING', fn: renderGPU },
  reddit:   { title:'REDDIT / SOCIAL VOLUME', fn: renderReddit },
  hf:       { title:'HUGGINGFACE DOWNLOADS', fn: renderHF },
};

let currentView = 'overview';

function showView(view, el){
  destroyAll();
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  currentView = view;
  document.getElementById('page-title').textContent = VIEWS[view]?.title || view.toUpperCase();
  document.getElementById('content').innerHTML='';
  VIEWS[view]?.fn();
}

function setRange(w, el){
  WEEKS = w;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  showView(currentView, null);
}

/* ─── INIT ─── */
renderOverview();
</script>
